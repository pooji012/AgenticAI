<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1900" viewBox="0 0 1400 1900">
  <defs>
    <style>
      .bg { fill: #f7f9fb; }
      .title { font: 700 34px Arial, sans-serif; fill: #172033; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #526174; }
      .lane-title { font: 700 18px Arial, sans-serif; fill: #ffffff; }
      .node-title { font: 700 19px Arial, sans-serif; fill: #172033; }
      .node-text { font: 400 15px Arial, sans-serif; fill: #38465a; }
      .small { font: 400 13px Arial, sans-serif; fill: #526174; }
      .start-end { fill: #1f6feb; stroke: #174ea6; stroke-width: 3; }
      .end { fill: #172033; stroke: #172033; stroke-width: 3; }
      .node { fill: #ffffff; stroke: #b7c4d4; stroke-width: 2; rx: 16; }
      .data { fill: #fff8e7; stroke: #d99d20; stroke-width: 2; rx: 16; }
      .agent { fill: #ecf7f1; stroke: #2e8b57; stroke-width: 2; rx: 16; }
      .ui { fill: #eef2ff; stroke: #5b6ee1; stroke-width: 2; rx: 16; }
      .output { fill: #f3ecff; stroke: #7b4dbb; stroke-width: 2; rx: 16; }
      .decision { fill: #ffffff; stroke: #c45151; stroke-width: 2; }
      .arrow { fill: none; stroke: #526174; stroke-width: 2.6; marker-end: url(#arrowhead); }
      .arrow-alt { fill: none; stroke: #7b4dbb; stroke-width: 2.4; marker-end: url(#arrowhead-purple); stroke-dasharray: 8 7; }
      .label { font: 700 13px Arial, sans-serif; fill: #526174; }
      .lane { fill: #ffffff; stroke: #d8e0ea; stroke-width: 2; }
      .lane-head-1 { fill: #315f83; }
      .lane-head-2 { fill: #2e7d55; }
      .lane-head-3 { fill: #5b5fc7; }
      .lane-head-4 { fill: #744fa8; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="9" refX="11" refY="4.5" orient="auto">
      <path d="M0,0 L12,4.5 L0,9 z" fill="#526174"/>
    </marker>
    <marker id="arrowhead-purple" markerWidth="12" markerHeight="9" refX="11" refY="4.5" orient="auto">
      <path d="M0,0 L12,4.5 L0,9 z" fill="#7b4dbb"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="1900"/>
  <text class="title" x="700" y="58" text-anchor="middle">Activity Diagram: Intelligent User Feedback Analysis and Action System</text>
  <text class="subtitle" x="700" y="92" text-anchor="middle">Capstone workflow from CSV ingestion to multi-agent analysis, ticket generation, review, UI override, and demo metrics</text>

  <rect class="lane" x="70" y="130" width="1260" height="360" rx="18"/>
  <rect class="lane-head-1" x="70" y="130" width="1260" height="48" rx="18"/>
  <text class="lane-title" x="100" y="161">Step 1: Prepare Mock Dataset CSV Files</text>

  <circle class="start-end" cx="700" cy="220" r="24"/>
  <text class="small" x="700" y="260" text-anchor="middle">Start</text>

  <rect class="data" x="135" y="310" width="270" height="92"/>
  <text class="node-title" x="270" y="343" text-anchor="middle">Create app_store_reviews.csv</text>
  <text class="node-text" x="270" y="369" text-anchor="middle">reviews, platform, rating, user,</text>
  <text class="node-text" x="270" y="391" text-anchor="middle">date, app version, review text</text>

  <rect class="data" x="565" y="310" width="270" height="92"/>
  <text class="node-title" x="700" y="343" text-anchor="middle">Create support_emails.csv</text>
  <text class="node-text" x="700" y="369" text-anchor="middle">email subject, body, sender,</text>
  <text class="node-text" x="700" y="391" text-anchor="middle">timestamp, optional priority</text>

  <rect class="data" x="995" y="310" width="270" height="92"/>
  <text class="node-title" x="1130" y="343" text-anchor="middle">Create expected_classifications.csv</text>
  <text class="node-text" x="1130" y="369" text-anchor="middle">source id, category, priority,</text>
  <text class="node-text" x="1130" y="391" text-anchor="middle">technical details, suggested title</text>

  <path class="arrow" d="M700 244 L700 289"/>
  <path class="arrow" d="M700 289 L270 289 L270 310"/>
  <path class="arrow" d="M700 289 L700 310"/>
  <path class="arrow" d="M700 289 L1130 289 L1130 310"/>

  <rect class="lane" x="70" y="530" width="1260" height="765" rx="18"/>
  <rect class="lane-head-2" x="70" y="530" width="1260" height="48" rx="18"/>
  <text class="lane-title" x="100" y="561">Step 2: Multi-Agent System Implementation</text>

  <rect class="node" x="500" y="620" width="400" height="82"/>
  <text class="node-title" x="700" y="653" text-anchor="middle">Configure System</text>
  <text class="node-text" x="700" y="679" text-anchor="middle">classification thresholds, priorities, logging, error handling</text>

  <rect class="agent" x="500" y="752" width="400" height="82"/>
  <text class="node-title" x="700" y="785" text-anchor="middle">CSV Reader Agent</text>
  <text class="node-text" x="700" y="811" text-anchor="middle">read, validate, parse, and normalize feedback rows</text>

  <rect class="agent" x="500" y="884" width="400" height="92"/>
  <text class="node-title" x="700" y="916" text-anchor="middle">Feedback Classifier Agent</text>
  <text class="node-text" x="700" y="942" text-anchor="middle">classify as Bug, Feature Request, Praise,</text>
  <text class="node-text" x="700" y="964" text-anchor="middle">Complaint, or Spam with confidence score</text>

  <polygon class="decision" points="700,1030 830,1100 700,1170 570,1100"/>
  <text class="node-title" x="700" y="1094" text-anchor="middle">Feedback</text>
  <text class="node-title" x="700" y="1118" text-anchor="middle">Category?</text>

  <rect class="agent" x="130" y="1047" width="285" height="96"/>
  <text class="node-title" x="272" y="1080" text-anchor="middle">Bug Analysis Agent</text>
  <text class="node-text" x="272" y="1106" text-anchor="middle">extract reproduction steps,</text>
  <text class="node-text" x="272" y="1128" text-anchor="middle">platform, severity, technical details</text>

  <rect class="agent" x="985" y="1047" width="285" height="96"/>
  <text class="node-title" x="1127" y="1080" text-anchor="middle">Feature Extractor Agent</text>
  <text class="node-text" x="1127" y="1106" text-anchor="middle">identify requested capability,</text>
  <text class="node-text" x="1127" y="1128" text-anchor="middle">impact, demand, and priority</text>

  <rect class="agent" x="500" y="1210" width="400" height="82"/>
  <text class="node-title" x="700" y="1243" text-anchor="middle">Ticket Creator Agent</text>
  <text class="node-text" x="700" y="1269" text-anchor="middle">generate structured tickets with metadata and traceability</text>

  <path class="arrow" d="M270 402 L270 445 L700 445 L700 620"/>
  <path class="arrow" d="M700 402 L700 620"/>
  <path class="arrow" d="M1130 402 L1130 445 L700 445"/>
  <path class="arrow" d="M700 702 L700 752"/>
  <path class="arrow" d="M700 834 L700 884"/>
  <path class="arrow" d="M700 976 L700 1030"/>
  <path class="arrow" d="M570 1100 L415 1100"/>
  <text class="label" x="475" y="1085" text-anchor="middle">Bug</text>
  <path class="arrow" d="M830 1100 L985 1100"/>
  <text class="label" x="925" y="1085" text-anchor="middle">Feature</text>
  <path class="arrow" d="M700 1170 L700 1210"/>
  <text class="label" x="755" y="1198">Praise / Complaint / Spam</text>
  <path class="arrow" d="M272 1143 L272 1251 L500 1251"/>
  <path class="arrow" d="M1127 1143 L1127 1251 L900 1251"/>

  <rect class="lane" x="70" y="1335" width="1260" height="315" rx="18"/>
  <rect class="lane-head-3" x="70" y="1335" width="1260" height="48" rx="18"/>
  <text class="lane-title" x="100" y="1366">Quality Control, Output Files, and User Interface</text>

  <rect class="agent" x="170" y="1435" width="320" height="88"/>
  <text class="node-title" x="330" y="1468" text-anchor="middle">Quality Critic Agent</text>
  <text class="node-text" x="330" y="1494" text-anchor="middle">review completeness, accuracy, priority,</text>
  <text class="node-text" x="330" y="1516" text-anchor="middle">format consistency, and missing details</text>

  <polygon class="decision" points="700,1417 820,1487 700,1557 580,1487"/>
  <text class="node-title" x="700" y="1481" text-anchor="middle">Ticket</text>
  <text class="node-title" x="700" y="1505" text-anchor="middle">Approved?</text>

  <rect class="output" x="930" y="1431" width="300" height="104"/>
  <text class="node-title" x="1080" y="1464" text-anchor="middle">Write Output CSV Files</text>
  <text class="node-text" x="1080" y="1490" text-anchor="middle">generated_tickets.csv</text>
  <text class="node-text" x="1080" y="1512" text-anchor="middle">processing_log.csv, metrics.csv</text>

  <rect class="ui" x="325" y="1575" width="750" height="56"/>
  <text class="node-title" x="700" y="1611" text-anchor="middle">Streamlit UI: dashboard, configuration panel, analytics, and manual overrides</text>

  <path class="arrow" d="M700 1292 L700 1417"/>
  <path class="arrow" d="M580 1487 L490 1487"/>
  <path class="arrow" d="M330 1435 L330 1388 L700 1388 L700 1417"/>
  <text class="label" x="535" y="1474" text-anchor="middle">Needs fixes</text>
  <path class="arrow" d="M820 1487 L930 1487"/>
  <text class="label" x="875" y="1474" text-anchor="middle">Yes</text>
  <path class="arrow-alt" d="M1080 1535 L1080 1603 L1075 1603"/>
  <path class="arrow-alt" d="M700 1575 L700 1557"/>

  <rect class="lane" x="70" y="1690" width="1260" height="150" rx="18"/>
  <rect class="lane-head-4" x="70" y="1690" width="1260" height="48" rx="18"/>
  <text class="lane-title" x="100" y="1721">Step 3: Demonstration and Testing</text>

  <rect class="node" x="250" y="1768" width="900" height="48"/>
  <text class="node-title" x="700" y="1799" text-anchor="middle">Demo ingestion, real-time agent processing, accuracy comparison, ticket formatting, UI functions, and error handling</text>

  <circle class="end" cx="700" cy="1865" r="25"/>
  <circle fill="#f7f9fb" cx="700" cy="1865" r="13"/>

  <path class="arrow" d="M1080 1535 L1080 1665 L700 1665 L700 1768"/>
  <path class="arrow" d="M700 1816 L700 1840"/>
  <text class="small" x="700" y="1895" text-anchor="middle">End: Complete capstone implementation ready for submission/demo</text>
</svg>
